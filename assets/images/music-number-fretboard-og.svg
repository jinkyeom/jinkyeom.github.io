  <text x="89" y="161" class="headline">왜 음악에서는 자꾸</text>
  <text x="89" y="220" class="headline">숫자로 이야기할까?</text>
  <text x="91" y="274" class="board-label">C MAJOR · 숫자와 음 이름을 같은 지판 위에서</text>
