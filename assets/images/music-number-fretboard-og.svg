  <title id="title">왜 음악에서는 자꾸 숫자로 이야기할까?</title>
  <desc id="desc">C장조의 숫자 1부터 7과 음 이름 C부터 B를 단순화한 기타 지판 위에 함께 배치한 대표 이미지</desc>
