<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드럼 리듬 게임 데모</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .drum-game-shell {
            position: relative;
            width: min(100%, 800px);
            margin: 1.5rem auto;
            border: 1px solid rgba(120, 140, 165, 0.38);
            border-radius: 12px;
            background: #0a0a0a;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
            overflow: visible;
        }
        .drum-game-shell [hidden] {
            display: none !important;
        }
        #drum-game-canvas {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 12px;
        }

        .judgment-line {
            position: absolute;
            bottom: 10%;
            width: 100%;
            height: 2px;
            background-color: white;
            z-index: 5;
        }
        .note {
            position: absolute;
            width: 80%;
            height: 20px;
            border-radius: 5px;
            margin-left: 10%;
            z-index: 10;
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 20;
        }
        #combo-display {
            position: absolute;
            top: 50px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 20;
        }
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 30;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .overlay-panel {
            position: absolute;
            inset: 0;
            place-content: center;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            color: white;
            z-index: 100;
        }
        .overlay-panel:not([hidden]) {
            display: grid;
        }
        #game-over-panel {
            z-index: 120;
            pointer-events: auto;
        }
        #restart-game-button {
            position: relative;
            z-index: 121;
            pointer-events: auto;
            cursor: pointer;
        }
        .overlay-panel h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .overlay-panel p {
            font-size: 20px;
            margin: 5px 0;
        }
        .overlay-panel .instructions {
            font-size: 16px;
            color: #d9e0e8;
            margin: 20px 0;
        }
        button {
            position: relative;
            z-index: 121;
            pointer-events: auto;
            cursor: pointer;
            color: #f5f7fa;
            background: #3a414b;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            margin-top: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #4a525d;
        }
    </style>
</head>
<body>
    <div style="width: 100%;">
        <div class="drum-game-shell" id="drum-game" tabindex="0">
            <canvas id="drum-game-canvas" width="800" height="600"></canvas>
            
            <div class="judgment-line"></div>
            
            <div id="score-display">점수: 0</div>
            <div id="combo-display">콤보: 0</div>
            <div id="feedback"></div>
            
            <div id="start-panel" class="overlay-panel">
                <h2>8마디 드럼 리듬 게임</h2>
                <p class="instructions">A, S, D, F 키를 사용하여 내려오는 노트에 맞춰 드럼을 연주하세요!</p>
                <button id="start-button">게임 시작</button>
            </div>

            <div id="game-over-panel" class="overlay-panel" hidden>
                <h2>게임 종료!</h2>
                <p id="final-score">최종 점수: 0</p>
                <p id="max-combo">최대 콤보: 0</p>
                <button id="restart-game-button" type="button">다시 시작 (R)</button>
            </div>
        </div>
    </div>

    <script>
        let gameState = "idle"; // idle | playing | gameover
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let notes = [];
        let animationId;
        
        const gameContainer = document.getElementById('drum-game');
        const canvas = document.getElementById('drum-game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const comboDisplay = document.getElementById('combo-display');
        const feedback = document.getElementById('feedback');
        
        const startPanel = document.getElementById('start-panel');
        const gameOverPanel = document.getElementById('game-over-panel');
        const finalScoreDisplay = document.getElementById('final-score');
        const maxComboDisplay = document.getElementById('max-combo');
        
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-game-button');
        
        const lanes = [
            { code: 'KeyA', color: '#ff4d4d', x: 0 },
            { code: 'KeyS', color: '#4d4dff', x: 200 },
            { code: 'KeyD', color: '#ffff4d', x: 400 },
            { code: 'KeyF', color: '#4dff4d', x: 600 }
        ];
        
        const keyMap = {
            KeyA: 0,
            KeyS: 1,
            KeyD: 2,
            KeyF: 3
        };

        const judgmentLineY = 540; // 600 * 0.9 = 540
        
        const activeKeys = new Map();

        function flashKey(code) {
            activeKeys.set(code, performance.now() + 150);
        }

        const laneLabels = [
            { name: "KICK", key: "A", code: "KeyA" },
            { name: "SNARE", key: "S", code: "KeyS" },
            { name: "HI-HAT", key: "D", code: "KeyD" },
            { name: "TOM", key: "F", code: "KeyF" },
        ];

        function drawLaneLabels(ctx, width, height) {
            const laneWidth = width / 4;
            const now = performance.now();

            ctx.save();
            ctx.textAlign = "center";

            laneLabels.forEach((lane, index) => {
                const centerX = laneWidth * index + laneWidth / 2;
                const isActive = activeKeys.get(lane.code) > now;

                if (isActive) {
                    ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                    ctx.fillRect(laneWidth * index, height - 80, laneWidth, 80);
                }

                ctx.font = "600 18px sans-serif";
                ctx.fillStyle = isActive ? "#ffb45e" : "#d9e0e8";
                ctx.fillText(lane.name, centerX, height - 44);

                ctx.font = "700 24px sans-serif";
                ctx.fillStyle = isActive ? "#ffb45e" : "#ffffff";
                ctx.fillText(lane.key, centerX, height - 16);
            });

            ctx.restore();
        }
        
        function isEditableElement(element) {
            return (
                element instanceof HTMLInputElement ||
                element instanceof HTMLTextAreaElement ||
                element instanceof HTMLSelectElement ||
                element?.isContentEditable
            );
        }

        function handleKeyDown(event) {
            if (isEditableElement(event.target)) return;
            
            if (gameState === "gameover" && event.code === "KeyR") {
                event.preventDefault();
                startGame();
                return;
            }

            if (!(event.code in keyMap)) return;

            flashKey(event.code);
            
            if (gameState !== "playing") {
                render();
                setTimeout(render, 160);
                return;
            }

            event.preventDefault();
            if (event.repeat) return;

            hitDrum(keyMap[event.code]);
        }

        function hitDrum(laneIndex) {
            let hitSuccess = false;
            
            for (let note of notes) {
                if (note.laneIndex === laneIndex && !note.hit && !note.missed) {
                    if (judgmentLineY - 40 <= note.y && note.y <= judgmentLineY + 40) {
                        note.hit = true;
                        hitSuccess = true;
                        
                        if (judgmentLineY - 20 <= note.y && note.y <= judgmentLineY + 20) {
                            score += 100;
                            showFeedback('Perfect!', '#00ff00');
                            combo++;
                        } else {
                            score += 50;
                            showFeedback('Good!', '#ffff00');
                            combo++;
                        }
                        
                        maxCombo = Math.max(maxCombo, combo);
                        renderScore();
                        break;
                    }
                }
            }
            
            if (!hitSuccess) {
                combo = 0;
                renderScore();
                showFeedback('Miss!', '#ff0000');
            }
        }

        function renderScore() {
            scoreDisplay.textContent = `점수: ${score}`;
            comboDisplay.textContent = `콤보: ${combo}`;
        }

        function renderState() {
            startPanel.hidden = gameState !== "idle";
            gameOverPanel.hidden = gameState !== "gameover";
            
            if (gameState === "idle") {
                score = 0;
                combo = 0;
                renderScore();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (typeof drawLaneLabels === 'function') {
                    drawLaneLabels(ctx, canvas.width, canvas.height);
                }
            }
        }

        function generateNotes() {
            let newNotes = [];
            for (let measure = 0; measure < 8; measure++) {
                for (let beat = 0; beat < 4; beat++) {
                    if (Math.random() > 0.5) {
                        const laneIndex = Math.floor(Math.random() * 4);
                        const lane = lanes[laneIndex];
                        newNotes.push({
                            x: lane.x,
                            y: -100 - (measure * 4 + beat) * 120,
                            speed: 4,
                            width: 200,
                            height: 25,
                            hit: false,
                            missed: false,
                            laneIndex: laneIndex
                        });
                    }
                }
            }
            return newNotes;
        }

        function resetGameData() {
            if (animationId !== null) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            score = 0;
            combo = 0;
            maxCombo = 0;
            notes = generateNotes();
            
            renderScore();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawLaneLabels(ctx, canvas.width, canvas.height);
        }
        
        function restartGame() {
            resetGameData();
            
            gameState = "playing";
            renderState();
            
            gameContainer.focus({ preventScroll: true });
            
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            restartGame();
        }
        
        function update() {
            let allNotesProcessed = true;
            
            for (let note of notes) {
                if (!note.hit && !note.missed) {
                    allNotesProcessed = false;
                    note.y += note.speed;
                    
                    if (note.y > judgmentLineY + 40 && !note.hit) {
                        note.missed = true;
                        combo = 0;
                        renderScore();
                    }
                }
            }
            
            if (allNotesProcessed && notes.length > 0) {
                gameState = "gameover";
                animationId = null;
                finalScoreDisplay.textContent = `최종 점수: ${score}`;
                maxComboDisplay.textContent = `최대 콤보: ${maxCombo}`;
                renderState();
            }
        }
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawLaneLabels(ctx, canvas.width, canvas.height);
            
            for (let note of notes) {
                if (!note.hit && !note.missed) {
                    ctx.fillStyle = lanes[note.laneIndex].color;
                    ctx.fillRect(note.x + 20, note.y, note.width - 40, note.height);
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.fillRect(note.x + 20, note.y, note.width - 40, 3);
                }
            }
        }
        
        function showFeedback(text, color) {
            feedback.textContent = text;
            feedback.style.color = color;
            feedback.style.opacity = 1;
            feedback.style.transform = `translate(-50%, -50%) scale(1.2)`;
            
            setTimeout(() => {
                feedback.style.transform = `translate(-50%, -50%) scale(1)`;
            }, 50);

            setTimeout(() => {
                feedback.style.opacity = 0;
            }, 400);
        }
        
        function gameLoop() {
            if (gameState !== "playing") {
                animationId = null;
                return;
            }
            
            update();
            render();
            
            if (gameState === "playing") {
                animationId = requestAnimationFrame(gameLoop);
            }
        }
        
        // Event Listeners
        window.removeEventListener('keydown', handleKeyDown);
        window.addEventListener('keydown', handleKeyDown, { passive: false });
        
        gameContainer.addEventListener('pointerdown', () => {
            gameContainer.focus({ preventScroll: true });
        });
        
        startButton.addEventListener('click', startGame);
        restartButton?.addEventListener('click', (event) => {
            console.log("restart clicked");
            event.preventDefault();
            event.stopPropagation();
            restartGame();
        });

        // Initialize state
        renderState();
    </script>
</body>
</html>
