<link rel="stylesheet" href="{{ '/assets/css/guitar-theory/dia-fretboard.css' | relative_url }}">
<figure id="dia-fretboard" class="dia-fretboard" aria-labelledby="dia-fretboard-caption">
  <h3 class="dia-fretboard__title">같은 간격을 따라가면<br>4도의 흐름이 지판 전체에서 반복된다</h3>
  <div class="dia-fretboard__scroll" role="img" aria-label="표준 조율 기타에서 여섯 출발점의 완전4도 진행이 6번 줄부터 1번 줄까지 이어지는 지판. 3번 줄에서 2번 줄로 갈 때 한 프렛 이동하며, C에서 시작하는 경로를 강조한다.">
    <svg class="dia-fretboard__svg" viewBox="0 0 850 490" aria-hidden="true"><style>.dia-fretboard__svg{min-width:780px}.fretboard-labels text:nth-child(-n+6){text-anchor:start}</style>
      <g class="fretboard-grid"><path d="M85 100H813M85 160H813M85 220H813M85 280H813M85 340H813M85 400H813"/>{% for fret in (0..13) %}{% assign x = fret | times: 56 | plus: 85 %}<path d="M{{ x }} 75V425"/>{% endfor %}</g>
      <g class="fretboard-labels"><text x="8" y="106">1번 줄 · E</text><text x="8" y="166">2번 줄 · B</text><text x="8" y="226">3번 줄 · G</text><text x="8" y="286">4번 줄 · D</text><text x="8" y="346">5번 줄 · A</text><text x="8" y="406">6번 줄 · E</text><text x="225" y="458">3</text><text x="337" y="458">5</text><text x="449" y="458">7</text><text x="505" y="458">8</text><text x="617" y="458">10</text><text x="729" y="458">12</text><text x="617" y="60" class="fretboard-shift">2번 줄에서 +1프렛</text></g>
      <g transform="translate(-83 0)"><g class="fretboard-path fretboard-path--neutral"><path d="M420 400V220L476 160V100"/><path d="M532 400V220L588 160V100"/><path d="M700 400V220L756 160V100"/><path d="M812 400V220L868 160V100"/></g><g class="fretboard-path fretboard-path--g"><path d="M308 400V220L364 160V100"/></g><g class="fretboard-path fretboard-path--c"><path d="M588 400V220L644 160V100"/></g>
      <g class="fretboard-nodes fretboard-nodes--neutral"><g transform="translate(420 400)"><circle/><text>A</text></g><g transform="translate(420 340)"><circle/><text>D</text></g><g transform="translate(420 280)"><circle/><text>G</text></g><g transform="translate(420 220)"><circle/><text>C</text></g><g transform="translate(476 160)"><circle/><text>F</text></g><g transform="translate(476 100)"><circle/><text>B♭</text></g><g transform="translate(532 400)"><circle/><text>B</text></g><g transform="translate(532 340)"><circle/><text>E</text></g><g transform="translate(532 280)"><circle/><text>A</text></g><g transform="translate(532 220)"><circle/><text>D</text></g><g transform="translate(588 160)"><circle/><text>G</text></g><g transform="translate(588 100)"><circle/><text>C</text></g><g transform="translate(700 400)"><circle/><text>D</text></g><g transform="translate(700 340)"><circle/><text>G</text></g><g transform="translate(700 280)"><circle/><text>C</text></g><g transform="translate(700 220)"><circle/><text>F</text></g><g transform="translate(756 160)"><circle/><text>B♭</text></g><g transform="translate(756 100)"><circle/><text>E♭</text></g><g transform="translate(812 400)"><circle/><text>E</text></g><g transform="translate(812 340)"><circle/><text>A</text></g><g transform="translate(812 280)"><circle/><text>D</text></g><g transform="translate(812 220)"><circle/><text>G</text></g><g transform="translate(868 160)"><circle/><text>C</text></g><g transform="translate(868 100)"><circle/><text>F</text></g></g>
      <g class="fretboard-nodes fretboard-nodes--g"><g transform="translate(308 400)"><circle/><text>G</text></g><g transform="translate(308 340)"><circle/><text>C</text></g><g transform="translate(308 280)"><circle/><text>F</text></g><g transform="translate(308 220)"><circle/><text>B♭</text></g><g transform="translate(364 160)"><circle/><text>E♭</text></g><g transform="translate(364 100)"><circle/><text>A♭</text></g></g><g class="fretboard-nodes fretboard-nodes--c"><g transform="translate(588 400)"><circle/><text>C</text></g><g transform="translate(588 340)"><circle/><text>F</text></g><g transform="translate(588 280)"><circle/><text>B♭</text></g><g transform="translate(588 220)"><circle/><text>E♭</text></g><g transform="translate(644 160)"><circle/><text>A♭</text></g><g transform="translate(644 100)"><circle/><text>D♭</text></g></g></g>
    </svg>
  </div>
  <figcaption id="dia-fretboard-caption">5도권을 적용하면 여러 코드 진행을 더 편리하게 연습할 수 있다.</figcaption>
</figure>
